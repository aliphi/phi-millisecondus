<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Camera Shader</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: monospace;
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem;
      background: rgba(0,0,0,0.85);
      white-space: pre-line;
      pointer-events: none;
    }
    #overlay.hidden { display: none; }
  </style>
</head>
<body>
  <div id="overlay">Starting camera…</div>

  <!--
    Import map: pins Three.js to a specific version so it works offline
    once the browser has cached the CDN response.
    For fully offline RPi deployment, swap the URL for a local copy:
      "three": "./vendor/three.module.js"
  -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
      }
    }
  </script>

  <script type="module" src="main.js"></script>
</body>
</html>
