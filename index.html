<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Camera Shader</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: monospace;
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem;
      background: rgba(0,0,0,0.85);
      white-space: pre-line;
      pointer-events: none;
    }
    #overlay.hidden { display: none; }

    #effect-btn {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.55rem 1.4rem;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-family: monospace;
      font-size: 0.85rem;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      user-select: none;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
      z-index: 10;
    }
    #effect-btn:hover  { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.5); }
    #effect-btn:active { background: rgba(255,255,255,0.25); }

    /* Brief label that fades in/out when the effect changes */
    #effect-toast {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.4rem 1.1rem;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-family: monospace;
      font-size: 0.8rem;
      border-radius: 999px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      z-index: 10;
    }
    #effect-toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="overlay">Starting camera…</div>

  <!--
    Import map: pins Three.js to a specific version so it works offline
    once the browser has cached the CDN response.
    For fully offline RPi deployment, swap the URL for a local copy:
      "three": "./vendor/three.module.js"
  -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
      }
    }
  </script>

  <script type="module" src="main.js"></script>
</body>
</html>
