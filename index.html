<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pixel Ramp</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
    #controls {
      position: fixed; bottom: 16px; left: 16px;
      display: flex; flex-direction: column; gap: 8px;
      font: 12px/1 monospace; color: #fff;
      background: rgba(0,0,0,0.55); padding: 12px 16px; border-radius: 4px;
      z-index: 10;
    }
    .row { display: flex; align-items: center; gap: 10px; }
    .row label { width: 14px; }
    .row span { width: 36px; text-align: right; }
    input[type=range] { width: 180px; }
  </style>
</head>
<body>
  <div id="controls">
    <div class="row"><label>X</label><input type="range" id="sliderX" min="0" max="0.5" step="0.001" value="0.43"><span id="valX">0.43</span></div>
    <div class="row"><label>Y</label><input type="range" id="sliderY" min="0" max="0.5" step="0.001" value="0.276"><span id="valY">0.276</span></div>
    <div class="row"><label>W</label><input type="range" id="sliderW" min="0.01" max="2.0" step="0.01" value="0.6"><span id="valW">0.6</span></div>
    <div class="row"><label>S</label><input type="range" id="sliderS" min="0.01" max="1.0" step="0.01" value="0.15"><span id="valS">0.15</span></div>
  </div>
  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
